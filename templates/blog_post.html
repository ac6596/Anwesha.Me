<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<title>{{ title }} — Anwesha Chakraborty</title>
<link href="/styles.css" rel="stylesheet" type="text/css">
<link href='https://fonts.googleapis.com/css?family=Bree+Serif' rel='stylesheet' type='text/css'>
<link href='https://fonts.googleapis.com/css?family=Open+Sans' rel='stylesheet' type='text/css'>
<style>
  .blog-post-page { margin: 0px 43px; padding-top: 140px; max-width: 720px; }
  .back-link { display: inline-block; margin-bottom: 24px; font-size: 13px; color: #888; text-decoration: none; }
  .back-link:hover { color: #333; }
  .blog-post-page h1 { font: 400 36px/44px 'Bree Serif', Georgia, serif; color: #6a6969; margin: 0 0 8px; }
  .post-meta { font-size: 12px; color: #888; font-style: italic; margin-bottom: 30px; }
  .post-body { font-size: 14px; line-height: 1.8; color: #6a6969; }
  .post-body h2 { font: 400 22px/28px 'Bree Serif', Georgia, serif; color: #6a6969; margin: 32px 0 10px; }
  .post-body h3 { font: 400 17px/22px 'Bree Serif', Georgia, serif; color: #6a6969; margin: 24px 0 8px; }
  .post-body p { margin: 0 0 16px; }
  .post-body ul, .post-body ol { margin: 0 0 16px 20px; }
  .post-body li { margin-bottom: 6px; }
  .post-body hr { border: none; border-top: 1px solid #e0e0e0; margin: 30px 0; }
  .post-body table { border-collapse: collapse; width: 100%; margin-bottom: 20px; font-size: 13px; }
  .post-body th, .post-body td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
  .post-body th { background: #f5f5f5; font-weight: bold; }
  .post-body code { background: #f5f5f5; padding: 2px 6px; border-radius: 3px; font-size: 13px; }
  .post-body pre { background: #f5f5f5; padding: 16px; border-radius: 4px; overflow-x: auto; }
  .post-body blockquote { border-left: 3px solid #ccc; margin: 0 0 16px; padding: 8px 16px; color: #888; font-style: italic; }
</style>
</head>
<body>
<div id="header">
  <div id="logo"><a href="/"><img src="/images/logo.png"></a></div>
  <ul id="main-menu">
    <li><a href="/#about">About</a></li>
    <li><a href="/#experience">Experience</a></li>
    <li><a href="/#work">Work</a></li>
    <li><a href="/blog">Blog</a></li>
    <li><a href="/#connect">Connect</a></li>
  </ul>
</div>

<div id="container">
  <div class="blog-post-page">
    <a href="/blog" class="back-link">&larr; All Posts</a>
    <h1>{{ title }}</h1>
    <div class="post-meta">{{ date }}</div>
    <div class="top-divider"></div>
    <div class="post-body">
      {{ content | safe }}
    </div>
    <div class="bottom-divider"></div>
  </div>
</div>
</body>
</html>
