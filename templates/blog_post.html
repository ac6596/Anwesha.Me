<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<script>
  (function() {
    var theme = localStorage.getItem('theme');
    if (theme === 'dim') {
      document.documentElement.setAttribute('data-theme', 'dim');
    }
  })();
</script>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{ title }} — Anwesha Chakraborty</title>
<link href="/styles.css" rel="stylesheet" type="text/css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  .blog-post-page { margin: 0 43px; padding-top: 110px; max-width: 720px; }
  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    margin-bottom: 28px;
    font: 600 13px/1 'Inter', sans-serif;
    color: var(--accent-light); text-decoration: none;
    border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 8px;
    transition: background 0.2s, color 0.2s;
  }
  .back-link:hover { background: var(--glass); color: var(--text); }
  .blog-post-page h1 {
    font: 800 38px/46px 'Inter', sans-serif;
    color: var(--text);
    letter-spacing: -0.02em;
    margin: 0 0 10px;
  }
  .post-meta { font-size: 12px; color: var(--text-muted); font-style: italic; margin-bottom: 32px; }
  .post-body { font: 400 15px/1.85 'Outfit', sans-serif; color: var(--text-sec); }
  .post-body h2 {
    font: 700 22px/28px 'Inter', sans-serif;
    color: var(--text);
    letter-spacing: -0.02em;
    margin: 36px 0 12px;
    border-left: 3px solid var(--accent);
    padding-left: 14px;
  }
  .post-body h3 {
    font: 600 17px/24px 'Inter', sans-serif;
    color: var(--text);
    letter-spacing: -0.01em;
    margin: 28px 0 10px;
  }
  .post-body p { margin: 0 0 18px; }
  .post-body ul, .post-body ol { margin: 0 0 18px 22px; }
  .post-body li { margin-bottom: 8px; }
  .post-body hr { border: none; border-top: 1px solid var(--border); margin: 36px 0; }
  .post-body table { border-collapse: collapse; width: 100%; margin-bottom: 20px; font-size: 13px; }
  .post-body th, .post-body td { border: 1px solid var(--border); padding: 10px 14px; text-align: left; }
  .post-body th { background: rgba(0,120,212,0.08); color: var(--text); font-weight: 600; }
  .post-body code {
    background: rgba(0,120,212,0.08);
    border: 1px solid rgba(0,120,212,0.18);
    padding: 2px 7px; border-radius: 4px;
    font-size: 13px; color: var(--accent-light);
  }
  .post-body pre {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    padding: 20px; border-radius: 10px;
    overflow-x: auto; margin-bottom: 20px;
  }
  .post-body pre code { background: none; border: none; padding: 0; color: var(--text-sec); }
  .post-body blockquote {
    border-left: 3px solid var(--accent);
    margin: 0 0 18px;
    padding: 10px 20px;
    color: var(--text-muted);
    font-style: italic;
    background: var(--glass);
    border-radius: 0 8px 8px 0;
  }
  .post-body a { color: var(--orange); text-decoration: underline; }
  .post-body a:hover { color: var(--orange-light); }
  .post-body img {
    max-width: 100%;
    width: 620px;
    height: auto;
    display: block;
    margin: 28px auto;
    border-radius: 12px;
    border: 1px solid var(--border);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
  }
</style>
</head>
<body>
<div id="header">
  <div id="logo"><a href="/"><img src="/images/logo.png"></a></div>
  <button id="theme-toggle" aria-label="Toggle theme" class="theme-toggle-btn">
    <svg class="crescent-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
    </svg>
    <svg class="sparkles-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.36-6.36l-.7.7M6.34 17.66l-.7.7M5.64 5.64l.7.7m11.32 11.32l.7.7"></path>
      <circle cx="12" cy="12" r="3"></circle>
    </svg>
  </button>
  <button id="mobile-menu-toggle" aria-label="Toggle menu" class="mobile-toggle-btn">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <ul id="main-menu">
    <li><a href="/#about">About</a></li>
    <li><a href="/#experience">Experience</a></li>
    <li><a href="/#work">Work</a></li>
    <li><a href="/blog">Blog</a></li>
    <li><a href="/#connect">Connect</a></li>
  </ul>
</div>

<div id="container">
  <div class="blog-post-page">
    <a href="/blog" class="back-link">&larr; All Posts</a>
    <h1>{{ title }}</h1>
    <div class="post-meta">{{ date }}</div>
    <div class="top-divider"></div>
    <div class="post-body">
      {{ content | safe }}
    </div>
    <div class="bottom-divider"></div>
  </div>
</div>
<script>
/* =====================================================
   THEME TOGGLE CLICK HANDLER
   ===================================================== */
(function() {
  var toggleBtn = document.getElementById('theme-toggle');
  if (!toggleBtn) return;
  
  toggleBtn.addEventListener('click', function() {
    var currentTheme = document.documentElement.getAttribute('data-theme');
    if (currentTheme === 'dim') {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('theme', 'midnight');
    } else {
      document.documentElement.setAttribute('data-theme', 'dim');
      localStorage.setItem('theme', 'dim');
    }
  });
})();
</script>
<script>
/* =====================================================
   MOBILE MENU TOGGLE HANDLER
   ===================================================== */
(function() {
  var menuToggle = document.getElementById('mobile-menu-toggle');
  var mainMenu = document.getElementById('main-menu');
  if (!menuToggle || !mainMenu) return;
  
  menuToggle.addEventListener('click', function(e) {
    e.stopPropagation();
    var isActive = menuToggle.classList.toggle('active');
    mainMenu.classList.toggle('active');
    if (isActive) {
      document.documentElement.classList.add('menu-open');
    } else {
      document.documentElement.classList.remove('menu-open');
    }
  });

  // Close menu when clicking outside (and not on theme toggle)
  document.addEventListener('click', function(e) {
    var themeToggle = document.getElementById('theme-toggle');
    if (mainMenu.classList.contains('active') && 
        !mainMenu.contains(e.target) && 
        e.target !== menuToggle && 
        (!themeToggle || !themeToggle.contains(e.target))) {
      menuToggle.classList.remove('active');
      mainMenu.classList.remove('active');
      document.documentElement.classList.remove('menu-open');
    }
  });

  // Close menu when clicking menu links
  var links = mainMenu.getElementsByTagName('a');
  for (var i = 0; i < links.length; i++) {
    links[i].addEventListener('click', function() {
      menuToggle.classList.remove('active');
      mainMenu.classList.remove('active');
      document.documentElement.classList.remove('menu-open');
    });
  }
})();
</script>
</body>
</html>
