<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<title>{{ title }} — Anwesha Chakraborty</title>
<link href="/styles.css" rel="stylesheet" type="text/css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  .blog-post-page { margin: 0 43px; padding-top: 110px; max-width: 720px; }
  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    margin-bottom: 28px;
    font: 600 13px/1 'Inter', sans-serif;
    color: #818CF8; text-decoration: none;
    border: 1px solid rgba(99,102,241,0.3);
    padding: 6px 14px; border-radius: 8px;
    transition: background 0.2s, color 0.2s;
  }
  .back-link:hover { background: rgba(99,102,241,0.15); color: #F1F5F9; }
  .blog-post-page h1 {
    font: 800 38px/46px 'Inter', sans-serif;
    color: #F1F5F9;
    letter-spacing: -0.02em;
    margin: 0 0 10px;
  }
  .post-meta { font-size: 12px; color: #94A3B8; font-style: italic; margin-bottom: 32px; }
  .post-body { font: 400 15px/1.85 'Outfit', sans-serif; color: #CBD5E1; }
  .post-body h2 {
    font: 700 22px/28px 'Inter', sans-serif;
    color: #F1F5F9;
    letter-spacing: -0.02em;
    margin: 36px 0 12px;
    border-left: 3px solid #6366F1;
    padding-left: 14px;
  }
  .post-body h3 {
    font: 600 17px/24px 'Inter', sans-serif;
    color: #E2E8F0;
    letter-spacing: -0.01em;
    margin: 28px 0 10px;
  }
  .post-body p { margin: 0 0 18px; }
  .post-body ul, .post-body ol { margin: 0 0 18px 22px; }
  .post-body li { margin-bottom: 8px; }
  .post-body hr { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 36px 0; }
  .post-body table { border-collapse: collapse; width: 100%; margin-bottom: 20px; font-size: 13px; }
  .post-body th, .post-body td { border: 1px solid rgba(255,255,255,0.1); padding: 10px 14px; text-align: left; }
  .post-body th { background: rgba(99,102,241,0.1); color: #F1F5F9; font-weight: 600; }
  .post-body code {
    background: rgba(99,102,241,0.1);
    border: 1px solid rgba(99,102,241,0.2);
    padding: 2px 7px; border-radius: 4px;
    font-size: 13px; color: #818CF8;
  }
  .post-body pre {
    background: #1E293B;
    border: 1px solid rgba(255,255,255,0.08);
    padding: 20px; border-radius: 10px;
    overflow-x: auto; margin-bottom: 20px;
  }
  .post-body pre code { background: none; border: none; padding: 0; color: #CBD5E1; }
  .post-body blockquote {
    border-left: 3px solid #6366F1;
    margin: 0 0 18px;
    padding: 10px 20px;
    color: #94A3B8;
    font-style: italic;
    background: rgba(99,102,241,0.05);
    border-radius: 0 8px 8px 0;
  }
  .post-body a { color: #818CF8; text-decoration: underline; }
  .post-body a:hover { color: #6366F1; }
</style>
</head>
<body>
<div id="header">
  <div id="logo"><a href="/"><img src="/images/logo.png"></a></div>
  <ul id="main-menu">
    <li><a href="/#about">About</a></li>
    <li><a href="/#experience">Experience</a></li>
    <li><a href="/#work">Work</a></li>
    <li><a href="/blog">Blog</a></li>
    <li><a href="/#connect">Connect</a></li>
  </ul>
</div>

<div id="container">
  <div class="blog-post-page">
    <a href="/blog" class="back-link">&larr; All Posts</a>
    <h1>{{ title }}</h1>
    <div class="post-meta">{{ date }}</div>
    <div class="top-divider"></div>
    <div class="post-body">
      {{ content | safe }}
    </div>
    <div class="bottom-divider"></div>
  </div>
</div>
</body>
</html>
