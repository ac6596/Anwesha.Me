<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<title>Blog — Anwesha Chakraborty</title>
<link href="/styles.css" rel="stylesheet" type="text/css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  .blog-list-page { margin: 0 43px; padding-top: 110px; }
  .post-list { list-style: none; margin: 30px 0 0; padding: 0; }
  .post-item {
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 28px 0;
    transition: transform 0.3s ease;
  }
  .post-item:last-child { border-bottom: none; }
  .post-item:hover { transform: translateX(4px); }
  .post-item .post-date { font-size: 12px; color: #94A3B8; font-style: italic; }
  .post-item h2 { margin: 8px 0 10px; font: 700 22px/28px 'Inter', sans-serif; letter-spacing: -0.02em; }
  .post-item h2 a { color: #F1F5F9; text-decoration: none; transition: color 0.2s; }
  .post-item h2 a:hover { color: #818CF8; }
  .post-item p { font-size: 14px; line-height: 1.75; color: #94A3B8; margin: 0 0 14px; }
  .read-more {
    display: inline-flex; align-items: center; gap: 7px;
    font: 600 13px/1 'Inter', sans-serif;
    color: #fff;
    border: none;
    background: linear-gradient(135deg, #6366F1 0%, #818CF8 100%);
    padding: 9px 22px; border-radius: 999px;
    text-decoration: none;
    transition: box-shadow 0.25s ease, transform 0.25s ease;
  }
  .read-more:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(99,102,241,0.45); color: #fff; }
</style>
</head>
<body>
<div id="header">
  <div id="logo"><a href="/"><img src="/images/logo.png"></a></div>
  <ul id="main-menu">
    <li><a href="/#about">About</a></li>
    <li><a href="/#experience">Experience</a></li>
    <li><a href="/#work">Work</a></li>
    <li><a href="/blog">Blog</a></li>
    <li><a href="/#connect">Connect</a></li>
  </ul>
</div>

<div id="container">
  <div class="blog-list-page">
    <h1>Blog</h1>
    <div class="top-divider"></div>

    <ul class="post-list">
      {% for post in posts %}
      <li class="post-item">
        <span class="post-date">{{ post.date }}</span>
        <h2><a href="/blog/{{ post.slug }}">{{ post.title }}</a></h2>
        <p>{{ post.excerpt }}</p>
        <a href="/blog/{{ post.slug }}" class="read-more">Read Post &rarr;</a>
      </li>
      {% endfor %}
    </ul>

    <div class="bottom-divider"></div>
  </div>
</div>
</body>
</html>
