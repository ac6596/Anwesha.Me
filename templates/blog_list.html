<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<title>Blog — Anwesha Chakraborty</title>
<link href="/styles.css" rel="stylesheet" type="text/css">
<link href='https://fonts.googleapis.com/css?family=Bree+Serif' rel='stylesheet' type='text/css'>
<link href='https://fonts.googleapis.com/css?family=Open+Sans' rel='stylesheet' type='text/css'>
<style>
  .blog-list-page { margin: 0px 43px; padding-top: 140px; }
  .blog-list-page h1 { font: 400 58px/60px 'Bree Serif', Georgia, serif; color: #6a6969; }
  .post-list { list-style: none; margin: 30px 0 0 0; padding: 0; }
  .post-item { border-bottom: 1px solid #e0e0e0; padding: 24px 0; }
  .post-item:last-child { border-bottom: none; }
  .post-item .post-date { font-size: 12px; color: #888; font-style: italic; }
  .post-item h2 { margin: 6px 0 8px; font: 400 22px/28px 'Bree Serif', Georgia, serif; }
  .post-item h2 a { color: #6a6969; text-decoration: none; }
  .post-item h2 a:hover { color: #333; }
  .post-item p { font-size: 13px; line-height: 1.7; color: #6a6969; margin: 0 0 12px; }
  .read-more { font-size: 13px; color: #333; border: 1px solid #ccc; padding: 5px 14px; border-radius: 4px; text-decoration: none; }
  .read-more:hover { background: #333; color: #fff; }
  .back-link { display: inline-block; margin-bottom: 20px; font-size: 13px; color: #888; text-decoration: none; }
  .back-link:hover { color: #333; }
</style>
</head>
<body>
<div id="header">
  <div id="logo"><a href="/"><img src="/images/logo.png"></a></div>
  <ul id="main-menu">
    <li><a href="/#about">About</a></li>
    <li><a href="/#experience">Experience</a></li>
    <li><a href="/#work">Work</a></li>
    <li><a href="/blog">Blog</a></li>
    <li><a href="/#connect">Connect</a></li>
  </ul>
</div>

<div id="container">
  <div class="blog-list-page">
    <h1>Blog</h1>
    <div class="top-divider"></div>

    <ul class="post-list">
      {% for post in posts %}
      <li class="post-item">
        <span class="post-date">{{ post.date }}</span>
        <h2><a href="/blog/{{ post.slug }}">{{ post.title }}</a></h2>
        <p>{{ post.excerpt }}</p>
        <a href="/blog/{{ post.slug }}" class="read-more">Read Post &rarr;</a>
      </li>
      {% endfor %}
    </ul>

    <div class="bottom-divider"></div>
  </div>
</div>
</body>
</html>
