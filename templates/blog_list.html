<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<script>
  (function() {
    var theme = localStorage.getItem('theme');
    if (theme === 'dim') {
      document.documentElement.setAttribute('data-theme', 'dim');
    }
  })();
</script>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blog — Anwesha Chakraborty</title>
<link href="/styles.css" rel="stylesheet" type="text/css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  .blog-list-page { margin: 0 43px; padding-top: 110px; }
  .post-list { list-style: none; margin: 30px 0 0; padding: 0; }
  .post-item {
    border-bottom: 1px solid var(--border);
    padding: 28px 0;
    transition: transform 0.3s ease;
  }
  .post-item:last-child { border-bottom: none; }
  .post-item:hover { transform: translateX(4px); }
  .post-item .post-date { font-size: 12px; color: var(--text-muted); font-style: italic; }
  .post-item h2 { margin: 8px 0 10px; font: 700 22px/28px 'Inter', sans-serif; letter-spacing: -0.02em; }
  .post-item h2 a { color: var(--text); text-decoration: none; transition: color 0.2s; }
  .post-item h2 a:hover { color: var(--orange); }
  .post-item p { font-size: 14px; line-height: 1.75; color: var(--text-sec); margin: 0 0 14px; }
  .read-more {
    display: inline-flex; align-items: center; gap: 7px;
    font: 600 13px/1 'Inter', sans-serif;
    color: #fff;
    border: none;
    background: linear-gradient(135deg, var(--orange) 0%, var(--orange-light) 100%);
    padding: 9px 22px; border-radius: 999px;
    text-decoration: none;
    transition: box-shadow 0.25s ease, transform 0.25s ease;
  }
  .read-more:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(249,115,22,0.45); color: #fff; }
</style>
</head>
<body>
<div id="header">
  <div id="logo"><a href="/"><img src="/images/logo.png"></a></div>
  <ul id="main-menu">
    <li><a href="/#about">About</a></li>
    <li><a href="/#experience">Experience</a></li>
    <li><a href="/#work">Work</a></li>
    <li><a href="/blog">Blog</a></li>
    <li><a href="/#connect">Connect</a></li>
    <li class="theme-toggle-li">
      <button id="theme-toggle" aria-label="Toggle theme" class="theme-toggle-btn">
        <svg class="crescent-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
        </svg>
        <svg class="sparkles-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.36-6.36l-.7.7M6.34 17.66l-.7.7M5.64 5.64l.7.7m11.32 11.32l.7.7"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
      </button>
    </li>
  </ul>
</div>

<div id="container">
  <div class="blog-list-page">
    <h1>Blog</h1>
    <div class="top-divider"></div>

    <ul class="post-list">
      {% for post in posts %}
      <li class="post-item">
        <span class="post-date">{{ post.date }}</span>
        <h2><a href="/blog/{{ post.slug }}">{{ post.title }}</a></h2>
        <p>{{ post.excerpt }}</p>
        <a href="/blog/{{ post.slug }}" class="read-more">Read Post &rarr;</a>
      </li>
      {% endfor %}
    </ul>

    <div class="bottom-divider"></div>
  </div>
</div>
<script>
/* =====================================================
   THEME TOGGLE CLICK HANDLER
   ===================================================== */
(function() {
  var toggleBtn = document.getElementById('theme-toggle');
  if (!toggleBtn) return;
  
  toggleBtn.addEventListener('click', function() {
    var currentTheme = document.documentElement.getAttribute('data-theme');
    if (currentTheme === 'dim') {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('theme', 'midnight');
    } else {
      document.documentElement.setAttribute('data-theme', 'dim');
      localStorage.setItem('theme', 'dim');
    }
  });
})();
</script>
</body>
</html>
